name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build check (syntax compile)
        run: python -m compileall ingestion scripts tests

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Prepare Pages artifact
        run: |
          rm -rf site
          mkdir -p site/data
          cp index.html site/index.html
          cp data/hotspots.json site/data/hotspots.json
          touch site/.nojekyll

      - name: Upload static artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
